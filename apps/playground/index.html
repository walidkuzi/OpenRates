<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenRates Playground</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --text: #e2e8f0;
      --muted: #8892a4;
      --accent: #6366f1;
      --accent-dim: #4f52c0;
      --success: #22c55e;
      --warn: #f59e0b;
      --error: #ef4444;
      --radius: 6px;
      --mono: "JetBrains Mono", "Fira Code", ui-monospace, monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
    header span { color: var(--muted); font-size: 12px; }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted); margin-left: auto;
      transition: background 0.3s;
    }
    .status-dot.ok { background: var(--success); }
    .status-dot.err { background: var(--error); }

    main {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 0;
      height: calc(100vh - 49px);
    }

    .panel {
      padding: 20px;
      overflow-y: auto;
      border-right: 1px solid var(--border);
    }

    .panel h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }

    .tab {
      padding: 6px 12px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
      font-weight: 500;
    }

    input, select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: var(--accent); }
    select option { background: var(--surface); }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    button.primary {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s;
    }
    button.primary:hover { background: var(--accent-dim); }
    button.primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .output-panel {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    .output-panel h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .result-summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .result-summary .amount {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 500;
      background: var(--border);
      color: var(--muted);
    }
    .badge.high { background: #14532d40; color: var(--success); }
    .badge.medium { background: #78350f40; color: var(--warn); }
    .badge.low { background: #7f1d1d40; color: var(--error); }
    .badge.live { background: #14532d40; color: var(--success); }

    .warnings {
      background: #78350f20;
      border: 1px solid #78350f60;
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 12px;
      color: var(--warn);
    }

    .json-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .json-block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
    }

    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .copy-btn:hover { color: var(--text); border-color: var(--muted); }

    pre {
      margin: 0;
      padding: 14px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.6;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--text);
    }

    .error-box {
      background: #7f1d1d20;
      border: 1px solid #7f1d1d80;
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 12px;
      color: var(--error);
    }

    .placeholder {
      color: var(--muted);
      font-size: 13px;
      padding: 40px 0;
      text-align: center;
    }

    .series-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      font-family: var(--mono);
    }
    .series-table th, .series-table td {
      padding: 6px 10px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .series-table th { color: var(--muted); font-weight: 500; }
    .series-table td.filled { color: var(--muted); font-style: italic; }

    .api-url {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px 10px;
      margin-bottom: 6px;
      overflow-x: auto;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <header>
    <h1>OpenRates</h1>
    <span>Playground</span>
    <div class="status-dot" id="statusDot" title="API status"></div>
  </header>

  <main>
    <div class="panel">
      <div class="tabs">
        <button class="tab active" data-tab="convert">Convert</button>
        <button class="tab" data-tab="rate">Rate</button>
        <button class="tab" data-tab="series">Series</button>
        <button class="tab" data-tab="currencies">Currencies</button>
      </div>

      <!-- Convert tab -->
      <div id="tab-convert">
        <div class="row">
          <div class="field">
            <label>Amount</label>
            <input type="text" id="c-amount" value="1000.00" />
          </div>
          <div class="field">
            <label>Mode</label>
            <select id="c-mode">
              <option value="official">official</option>
              <option value="market">market</option>
              <option value="auto" selected>auto</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label>From</label>
            <input type="text" id="c-from" value="USD" maxlength="3" />
          </div>
          <div class="field">
            <label>To</label>
            <input type="text" id="c-to" value="EUR" maxlength="3" />
          </div>
        </div>
        <div class="field">
          <label>Date (YYYY-MM-DD or "latest")</label>
          <input type="text" id="c-date" value="latest" />
        </div>
        <div class="row">
          <div class="field">
            <label>Response detail</label>
            <select id="c-detail">
              <option value="compact">compact</option>
              <option value="standard" selected>standard</option>
              <option value="full">full</option>
            </select>
          </div>
          <div class="field">
            <label>Use case</label>
            <select id="c-usecase">
              <option value="">general</option>
              <option value="invoice">invoice</option>
              <option value="accounting">accounting</option>
              <option value="travel">travel</option>
              <option value="ecommerce">ecommerce</option>
              <option value="treasury">treasury</option>
              <option value="reporting">reporting</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>Spread % (optional)</label>
          <input type="text" id="c-spread" placeholder="e.g. 0.5" />
        </div>
        <button class="primary" id="btn-convert">Convert</button>
      </div>

      <!-- Rate tab -->
      <div id="tab-rate" style="display:none">
        <div class="row">
          <div class="field">
            <label>Base</label>
            <input type="text" id="r-base" value="USD" maxlength="3" />
          </div>
          <div class="field">
            <label>Quote</label>
            <input type="text" id="r-quote" value="EUR" maxlength="3" />
          </div>
        </div>
        <div class="field">
          <label>Date (YYYY-MM-DD or "latest")</label>
          <input type="text" id="r-date" value="latest" />
        </div>
        <div class="row">
          <div class="field">
            <label>Mode</label>
            <select id="r-mode">
              <option value="official">official</option>
              <option value="market">market</option>
              <option value="auto" selected>auto</option>
            </select>
          </div>
          <div class="field">
            <label>Response detail</label>
            <select id="r-detail">
              <option value="compact">compact</option>
              <option value="standard" selected>standard</option>
              <option value="full">full</option>
            </select>
          </div>
        </div>
        <button class="primary" id="btn-rate">Get rate</button>
      </div>

      <!-- Series tab -->
      <div id="tab-series" style="display:none">
        <div class="row">
          <div class="field">
            <label>Base</label>
            <input type="text" id="s-base" value="USD" maxlength="3" />
          </div>
          <div class="field">
            <label>Quote</label>
            <input type="text" id="s-quote" value="EUR" maxlength="3" />
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label>Start date</label>
            <input type="text" id="s-start" value="2026-01-01" />
          </div>
          <div class="field">
            <label>End date</label>
            <input type="text" id="s-end" value="2026-03-31" />
          </div>
        </div>
        <div class="field">
          <label>Fill policy</label>
          <select id="s-fill">
            <option value="none">none</option>
            <option value="previous" selected>previous</option>
          </select>
        </div>
        <button class="primary" id="btn-series">Get series</button>
      </div>

      <!-- Currencies tab -->
      <div id="tab-currencies" style="display:none">
        <div class="field">
          <label>Search (code, name, country, symbol)</label>
          <input type="text" id="cur-query" placeholder="e.g. riyal, USD, Japan" />
        </div>
        <div class="field">
          <label>Status</label>
          <select id="cur-status">
            <option value="active" selected>active</option>
            <option value="all">all</option>
            <option value="retired">retired</option>
          </select>
        </div>
        <button class="primary" id="btn-currencies">Search currencies</button>
      </div>
    </div>

    <div class="output-panel" id="output">
      <p class="placeholder">Results appear here. Start the REST API with<br><code>pnpm --filter @openrates/api dev</code></p>
    </div>
  </main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
